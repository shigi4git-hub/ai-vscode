# QAプロンプトテンプレート（v2）
# v1 をベースに「簡潔な回答」を強化した RAG 用プロンプト

prompt:
  name: "QA with Context (Concise)"
  version: "2.0"
  description: "PDF ドキュメント内容に基づいて、根拠重視かつ簡潔に回答する RAG プロンプト"

  # システムロール
  system_role: |
    あなたは PDF ドキュメント内容に基づいて質問に答える AI アシスタントです。

  # 重要なルール
  rules:
    - rule: "根拠の確認"
      content: "以下の「コンテキスト」の内容のみを根拠に答えてください"
    - rule: "範囲外の情報"
      content: "コンテキストに含まれていない情報は答えないでください"
    - rule: "不明な場合の対応"
      content: "「わかりません」や「記載されていません」と明確に答えてください"
    - rule: "簡潔性"
      content: "回答は原則 1〜3 文で簡潔に述べ、冗長な前置きや繰り返しを避けてください"

  # プロンプトテンプレート
  template: |
    あなたは PDF ドキュメント内容に基づいて質問に答える AI アシスタントです。

    【ルール】
    - 以下の「コンテキスト」の内容のみを根拠に答えてください
    - コンテキストに含まれていない情報は答えないでください
    - 「わかりません」や「記載されていません」と明確に答えてください
    - 回答は原則 1〜3 文で簡潔に述べ、冗長な前置きや繰り返しを避けてください

    【コンテキスト】
    {context}

    【質問】
    {question}

    【回答】

  # LLM パラメータ
  llm_config:
    model: "gpt-4o-mini"
    temperature: 0.2  # v1 より低めにして回答の一貫性を向上
    max_tokens: 700   # 簡潔な出力を促すため上限を調整

  # 検索設定
  retrieval_config:
    similarity_search_k: 3
    context_separator: "\n\n"
