<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>投稿フォーム</title>
    <style>
        /* ストリーミング処理中のローディングアニメーション */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        .stream-result {
            margin-top: 1em;
            padding: 1em;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            display: none;
        }

        .stream-result.active {
            display: block;
        }
    </style>
</head>
<body>
    <h1>投稿フォーム</h1>

    <!-- ログイン用フォーム。username と password を送信して JWT を取得する -->
    <form id="login-form" style="margin-bottom: 1.5em;">
        <div>
            <label for="login-username">ユーザー名</label><br />
            <input type="text" id="login-username" name="username" required />
        </div>
        <div>
            <label for="login-password">パスワード</label><br />
            <input type="password" id="login-password" name="password" required />
        </div>
        <button type="submit">ログイン</button>
    </form>

    <div id="auth-status" role="status" aria-live="polite" style="margin-bottom: 1em;"></div>

    <!-- 未ログイン時は投稿フォームを非表示にする -->
    <div id="item-form-container" style="display: none;">
        <form id="item-form">
            <div>
                <label for="title">タイトル</label><br />
                <input type="text" id="title" name="title" required />
            </div>
            <div>
                <label for="body">本文</label><br />
                <textarea id="body" name="body" rows="5" required></textarea>
            </div>
            <button type="submit">送信</button>
        </form>
    </div>

    <div id="status" role="status" aria-live="polite" style="margin-top: 1em;"></div>

    <!-- ストリーミング確認用セクション -->
    <div id="stream-section" style="margin-top: 2em; padding: 1em; border: 1px solid #ccc; border-radius: 5px; display: none;">
        <h3>ストリーミング確認</h3>
        <p>最初の投稿（ID: 1）の内容をAIに分析させてストリーミングで結果を表示します。</p>
        <button type="button" id="stream-button">ストリーミング確認</button>
        
        <!-- ストリーミング処理中のステータス表示 -->
        <div id="stream-status" style="margin-top: 1em;"></div>
        
        <!-- ストリーミング結果の表示エリア -->
        <div id="stream-result" class="stream-result"></div>
    </div>

    <h2>投稿一覧</h2>
    <div id="items-container"></div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        const STORAGE_KEY = "access_token";
        const loginForm = document.getElementById("login-form");
        const authStatusElement = document.getElementById("auth-status");
        const itemFormContainer = document.getElementById("item-form-container");
        const form = document.getElementById("item-form");
        const statusElement = document.getElementById("status");
        const itemsContainer = document.getElementById("items-container");
        
        // ストリーミング関連のDOM要素
        const streamSection = document.getElementById("stream-section");
        const streamButton = document.getElementById("stream-button");
        const streamStatusElement = document.getElementById("stream-status");
        const streamResultElement = document.getElementById("stream-result");

        function getToken() {
            return localStorage.getItem(STORAGE_KEY);
        }

        function setAuthenticatedUI(isAuthenticated) {
            itemFormContainer.style.display = isAuthenticated ? "block" : "none";
            // ストリーミングセクションもログイン時に表示
            streamSection.style.display = isAuthenticated ? "block" : "none";
            authStatusElement.textContent = isAuthenticated
                ? "ログイン済みです。投稿できます。"
                : "ログインすると投稿フォームが表示されます。";
        }

        async function fetchItems() {
            statusElement.textContent = "読み込み中...";
            itemsContainer.innerHTML = "";

            try {
                const response = await fetch(`${API_URL}/items`);
                if (!response.ok) {
                    throw new Error("fetch failed");
                }

                const items = await response.json();
                statusElement.textContent = "";

                if (!Array.isArray(items) || items.length === 0) {
                    itemsContainer.textContent = "投稿がありません。";
                    return;
                }

                const list = document.createElement("ul");
                items.forEach((item) => {
                    const li = document.createElement("li");
                    li.innerHTML = `ID: ${item.id} <strong>${item.title}</strong><br />${item.body}`;
                    list.appendChild(li);
                });
                itemsContainer.appendChild(list);
            } catch (error) {
                statusElement.textContent = "データの取得に失敗しました";
            }
        }

        /**
         * ストリーミングエンドポイントを呼び出し、
         * OpenAI API のレスポンスをリアルタイムで画面に表示する関数
         * 
         * @param {number} itemId - ストリーミング対象のアイテムID
         */
        async function streamItemAnalysis(itemId) {
            // UI を更新：結果表示エリアをリセット
            streamResultElement.textContent = "";
            streamResultElement.classList.add("active");
            
            // ローディングアニメーション付きのステータス表示
            streamStatusElement.innerHTML = '<div class="loading-spinner"></div>生成中...';
            streamButton.disabled = true;

            try {
                // GET /items/stream?item_id={itemId} を fetch で呼び出す
                const response = await fetch(`${API_URL}/items/stream?item_id=${itemId}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // response.body から ReadableStream を取得
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = ""; // SSE フォーマットの未処理バッファ

                // チャンク単位でループして受信
                while (true) {
                    const { done, value } = await reader.read();
                    
                    if (done) {
                        // ストリーミング終了
                        break;
                    }

                    // バイト列をテキストにデコード
                    const chunk = decoder.decode(value, { stream: true });
                    buffer += chunk;

                    // SSE フォーマットを解析
                    // "data: {...}\n\n" という形式なので、"\n\n" で分割
                    const lines = buffer.split("\n\n");

                    // 最後の要素は不完全な可能性があるのでバッファに残す
                    buffer = lines[lines.length - 1];

                    // 完全なイベントを処理
                    for (let i = 0; i < lines.length - 1; i++) {
                        const line = lines[i].trim();
                        if (line.startsWith("data: ")) {
                            // "data: " プレフィックスを削除して JSON パース
                            const jsonStr = line.slice(6); // "data: " = 6文字
                            try {
                                const event = JSON.parse(jsonStr);

                                // イベントタイプに応じて処理
                                if (event.type === "chunk" && event.content) {
                                    // テキストチャンクを画面に追加
                                    streamResultElement.textContent += event.content;
                                    // 最新の内容にスクロール
                                    streamResultElement.scrollTop = streamResultElement.scrollHeight;
                                } else if (event.type === "done") {
                                    // ストリーミング完了
                                    console.log("Stream completed");
                                } else if (event.type === "error") {
                                    // エラーイベント
                                    throw new Error(event.error || "Unknown streaming error");
                                }
                            } catch (parseError) {
                                console.error("JSON parse error:", parseError, "Line:", jsonStr);
                            }
                        }
                    }
                }

                // ストリーミング完了後、ステータスを更新
                streamStatusElement.textContent = "完了しました！";
                streamStatusElement.style.color = "green";

                // 2秒後にアニメーションを消す
                setTimeout(() => {
                    streamStatusElement.textContent = "";
                    streamStatusElement.style.color = "";
                }, 2000);

            } catch (error) {
                // エラーが発生した場合
                streamResultElement.textContent = `エラーが発生しました: ${error.message}`;
                streamResultElement.style.color = "red";
                streamStatusElement.textContent = `エラー: ${error.message}`;
                streamStatusElement.style.color = "red";
                console.error("Streaming error:", error);
            } finally {
                // ボタンを再度有効化
                streamButton.disabled = false;
            }
        }

        // ストリーミングボタンのクリックイベントハンドラー
        streamButton.addEventListener("click", async () => {
            // item_id=1 でストリーミング処理を実行
            await streamItemAnalysis(1);
        });

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const username = document.getElementById("login-username").value.trim();
            const password = document.getElementById("login-password").value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                    },
                    body: new URLSearchParams({ username, password }).toString(),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "ログインに失敗しました");
                }

                const data = await response.json();
                if (!data.access_token) {
                    throw new Error("トークンが取得できませんでした");
                }

                // JWT を localStorage に保存する
                localStorage.setItem(STORAGE_KEY, data.access_token);
                setAuthenticatedUI(true);
                loginForm.reset();
                authStatusElement.textContent = "ログインしました。";
            } catch (error) {
                authStatusElement.textContent = error.message || "ログインに失敗しました";
            }
        });

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const title = document.getElementById("title").value.trim();
            const body = document.getElementById("body").value.trim();
            const token = getToken();

            if (!token) {
                authStatusElement.textContent = "ログインしてください。";
                return;
            }

            try {
                const response = await fetch(`${API_URL}/items`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`,
                    },
                    body: JSON.stringify({ title, body }),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "送信に失敗しました");
                }

                alert("投稿しました");
                form.reset();
                await fetchItems();
            } catch (error) {
                alert(error.message || "送信に失敗しました");
            }
        });

        // ページ読み込み時にトークンの有無で投稿フォームを切り替える
        setAuthenticatedUI(Boolean(getToken()));
        fetchItems();
    </script>
</body>
</html>
