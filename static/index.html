<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>投稿フォーム</title>
</head>
<body>
    <h1>投稿フォーム</h1>
    <form id="item-form">
        <div>
            <label for="title">タイトル</label><br />
            <input type="text" id="title" name="title" required />
        </div>
        <div>
            <label for="body">本文</label><br />
            <textarea id="body" name="body" rows="5" required></textarea>
        </div>
        <button type="submit">送信</button>
    </form>

    <div id="status" role="status" aria-live="polite" style="margin-top: 1em;"></div>
    <h2>投稿一覧</h2>
    <div id="items-container"></div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        const form = document.getElementById("item-form");
        const statusElement = document.getElementById("status");
        const itemsContainer = document.getElementById("items-container");

        async function fetchItems() {
            statusElement.textContent = "読み込み中...";
            itemsContainer.innerHTML = "";

            try {
                const response = await fetch(`${API_URL}/items`);
                if (!response.ok) {
                    throw new Error("fetch failed");
                }

                const items = await response.json();
                statusElement.textContent = "";

                if (!Array.isArray(items) || items.length === 0) {
                    itemsContainer.textContent = "投稿がありません。";
                    return;
                }

                const list = document.createElement("ul");
                items.forEach((item) => {
                    const li = document.createElement("li");
                    li.innerHTML = `ID: ${item.id} <strong>${item.title}</strong><br />${item.body}`;
                    list.appendChild(li);
                });
                itemsContainer.appendChild(list);
            } catch (error) {
                statusElement.textContent = "データの取得に失敗しました";
            }
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const title = document.getElementById("title").value.trim();
            const body = document.getElementById("body").value.trim();

            try {
                const response = await fetch(`${API_URL}/items`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ title, body }),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "送信に失敗しました");
                }

                alert("投稿しました");
                form.reset();
                await fetchItems();
            } catch (error) {
                alert(error.message || "送信に失敗しました");
            }
        });

        fetchItems();
    </script>
</body>
</html>
