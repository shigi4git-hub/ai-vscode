<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フィードバックループ Q&A - AI質問応答</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            height: 80vh;
            max-height: 700px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 10px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 18px 18px 4px 18px;
        }

        .message.ai .message-content {
            background: #e8e8e8;
            color: #333;
            border-radius: 18px 18px 18px 4px;
        }

        .feedback-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            padding-left: 10px;
        }

        .feedback-btn {
            padding: 8px 14px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .feedback-btn:hover {
            border-color: #667eea;
            transform: scale(1.05);
        }

        .feedback-btn.good {
            border-color: #4caf50;
            color: #4caf50;
        }

        .feedback-btn.good:hover {
            background: #f1f8f6;
        }

        .feedback-btn.bad {
            border-color: #f44336;
            color: #f44336;
        }

        .feedback-btn.bad:hover {
            background: #fdf1f1;
        }

        .feedback-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        .system-message {
            padding: 12px 16px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 4px;
            font-size: 13px;
            color: #856404;
            margin-top: 10px;
        }

        .system-message.error {
            background: #f8d7da;
            border-left-color: #f44336;
            color: #721c24;
        }

        .system-message.success {
            background: #d4edda;
            border-left-color: #4caf50;
            color: #155724;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background: white;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group input {
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
            resize: none;
            max-height: 100px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-group input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            min-width: 80px;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loop-info {
            font-size: 12px;
            color: #999;
            padding-top: 8px;
            text-align: right;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            font-size: 13px;
        }

        .loading::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: blink 1.4s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #999;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .empty-state-text {
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <div class="header">
            <h1>フィードバックループ Q&A</h1>
            <p>ドキュメントに基づいた質問応答 - 不満の場合は再質問ボタンで改善します</p>
        </div>

        <!-- チャットエリア -->
        <div class="chat-area" id="chatArea">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <div class="empty-state-text">
                    <p>質問を入力して「送信」ボタンを押してください</p>
                </div>
            </div>
        </div>

        <!-- 入力エリア -->
        <div class="input-area">
            <div class="input-group">
                <input
                    type="text"
                    id="questionInput"
                    placeholder="例: FastAPI の特徴は？"
                    disabled
                />
                <div class="loop-info">
                    <span id="loopCount" style="display: none;">ループ回数: <span id="loopValue">0</span></span>
                </div>
            </div>
            <button class="send-btn" id="sendBtn" disabled>送信</button>
        </div>
    </div>

    <script>
        // API エンドポイントの定数
        const API_URL = 'http://127.0.0.1:8000';
        const QA_ENDPOINT = `${API_URL}/qa/`;
        const FEEDBACK_ENDPOINT = `${API_URL}/feedback/`;

        // グローバル状態
        let currentQuestion = '';
        let currentAnswer = '';
        let currentLoopCount = 0;
        let currentRequestId = '';
        let isLoading = false;
        let consecutiveBadCount = 0;

        // DOM 要素
        const chatArea = document.getElementById('chatArea');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const loopInfo = document.getElementById('loopCount');
        const loopValue = document.getElementById('loopValue');

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            // ページ読み込み後、入力欄を有効化
            questionInput.disabled = false;
            sendBtn.disabled = false;

            // イベントリスナー設定
            sendBtn.addEventListener('click', handleSendQuestion);
            questionInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !isLoading) {
                    handleSendQuestion();
                }
            });
        });

        /**
         * 質問送信ハンドラー
         * - 初回：prompt_type="normal", loop_count=0
         */
        async function handleSendQuestion() {
            const question = questionInput.value.trim();
            if (!question || isLoading) return;

            currentQuestion = question;
            currentLoopCount = 0;
            consecutiveBadCount = 0;
            currentRequestId = generateUUID();

            // 入力欄をクリア・無効化
            questionInput.value = '';
            questionInput.disabled = true;
            sendBtn.disabled = true;

            // チャットエリアをクリア
            chatArea.innerHTML = '';

            // ユーザーの質問をチャットに表示
            displayMessage('user', question);

            // ローディング表示
            displayLoading();

            // RAG で回答を取得
            await fetchAnswer('normal', currentLoopCount);
        }

        /**
         * 回答を取得する（RAG）
         * @param {string} promptType - "normal" または "retry"
         * @param {number} loopCount - ループ回数
         */
        async function fetchAnswer(promptType, loopCount) {
            isLoading = true;

            try {
                const response = await fetch(QA_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: currentQuestion,
                        prompt_type: promptType,
                        loop_count: loopCount,
                    }),
                });

                if (!response.ok) {
                    throw new Error(`API エラー: ${response.status}`);
                }

                const data = await response.json();
                currentAnswer = data.answer;

                // チャットから前のローディングを削除
                removeLoading();

                // AI の回答を表示
                displayMessage('ai', currentAnswer);

                // 引用元を表示
                if (data.sources && data.sources.length > 0) {
                    displaySources(data.sources);
                }

                // GOOD / BAD ボタンを表示
                displayFeedbackButtons();

                // ループカウントを更新・表示
                updateLoopCount(loopCount);

            } catch (error) {
                removeLoading();
                displaySystemMessage(`エラーが発生しました: ${error.message}`, 'error');
                questionInput.disabled = false;
                sendBtn.disabled = false;
            } finally {
                isLoading = false;
            }
        }

        /**
         * GOOD ボタンがクリックされた場合
         * - /feedback で rating="good" を送信
         * - ログに good を記録
         * - 終了
         */
        async function handleGood() {
            displaySystemMessage('✓ 回答に満足いただきありがとうございます！', 'success');

            // フィードバック送信（dummy item_id: 1）
            await sendFeedback('good');

            // ボタンを無効化
            disableFeedbackButtons();

            // 次の質問を受け付ける
            setTimeout(() => {
                questionInput.disabled = false;
                sendBtn.disabled = false;
                questionInput.focus();
            }, 2000);
        }

        /**
         * BAD ボタンがクリックされた場合
         * - /feedback で rating="bad" を送信
         * - consecutiveBadCount をインクリメント
         * - 3 回続いたら終了、そうでなければ再質問
         */
        async function handleBad() {
            consecutiveBadCount++;

            // フィードバック送信
            await sendFeedback('bad');

            // ボタンを無効化
            disableFeedbackButtons();

            if (consecutiveBadCount >= 3) {
                // 3 回 BAD が続いた場合
                displaySystemMessage(
                    '申し訳ございません。改善できませんでした。別の質問をお試しください。',
                    'error'
                );

                // 次の質問を受け付ける
                setTimeout(() => {
                    questionInput.disabled = false;
                    sendBtn.disabled = false;
                    questionInput.focus();
                }, 2000);
            } else {
                // 再質問を自動実行
                displaySystemMessage('より詳しい説明で再質問を試みます...', 'info');
                currentLoopCount++;
                updateLoopCount(currentLoopCount);

                await new Promise(resolve => setTimeout(resolve, 1000));
                displayLoading();

                // retry プロンプトで再質問
                await fetchAnswer('retry', currentLoopCount);
            }
        }

        /**
         * フィードバックを送信する
         * @param {string} rating - "good" または "bad"
         */
        async function sendFeedback(rating) {
            try {
                const response = await fetch(FEEDBACK_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        item_id: 1,  // dummy ID
                        rating: rating,
                    }),
                });

                if (!response.ok) {
                    console.error(`フィードバック送信失敗: ${response.status}`);
                }
            } catch (error) {
                console.error('フィードバック送信エラー:', error);
            }
        }

        // UI 補助関数

        /**
         * メッセージをチャットに表示する
         */
        function displayMessage(role, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;

            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        /**
         * ローディング表示
         */
        function displayLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading';
            loadingDiv.className = 'message ai';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content loading';
            contentDiv.textContent = '回答を生成中です';

            loadingDiv.appendChild(contentDiv);
            chatArea.appendChild(loadingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        /**
         * ローディング表示を削除
         */
        function removeLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
        }

        /**
         * GOOD / BAD ボタンを表示
         */
        function displayFeedbackButtons() {
            const buttonsDiv = document.createElement('div');
            buttonsDiv.className = 'feedback-buttons';

            const goodBtn = document.createElement('button');
            goodBtn.className = 'feedback-btn good';
            goodBtn.textContent = '👍 役に立った';
            goodBtn.addEventListener('click', handleGood);

            const badBtn = document.createElement('button');
            badBtn.className = 'feedback-btn bad';
            badBtn.textContent = '👎 不十分です';
            badBtn.addEventListener('click', handleBad);

            buttonsDiv.appendChild(goodBtn);
            buttonsDiv.appendChild(badBtn);

            // 最後の AI メッセージの後に追加
            const lastMessage = chatArea.lastElementChild;
            lastMessage.appendChild(buttonsDiv);
        }

        /**
         * ボタンを無効化
         */
        function disableFeedbackButtons() {
            const buttons = document.querySelectorAll('.feedback-btn');
            buttons.forEach(btn => btn.disabled = true);
        }

        /**
         * 引用元を表示
         */
        function displaySources(sources) {
            const sourcesDiv = document.createElement('div');
            sourcesDiv.style.fontSize = '12px';
            sourcesDiv.style.color = '#666';
            sourcesDiv.style.marginTop = '8px';
            sourcesDiv.style.paddingTop = '8px';
            sourcesDiv.style.borderTop = '1px solid #ddd';

            const sourceTitle = document.createElement('div');
            sourceTitle.style.fontWeight = 'bold';
            sourceTitle.style.marginBottom = '4px';
            sourceTitle.textContent = '📎 引用元:';
            sourcesDiv.appendChild(sourceTitle);

            sources.forEach((source, index) => {
                const sourceItem = document.createElement('div');
                sourceItem.style.marginBottom = '6px';
                sourceItem.innerHTML = `<strong>${source.source}</strong> (p.${source.page})`;
                sourcesDiv.appendChild(sourceItem);
            });

            const lastMessage = chatArea.lastElementChild;
            lastMessage.appendChild(sourcesDiv);
        }

        /**
         * システムメッセージを表示
         */
        function displaySystemMessage(text, type = 'info') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `system-message ${type}`;
            msgDiv.textContent = text;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        /**
         * ループカウントを更新・表示
         */
        function updateLoopCount(count) {
            if (count > 0) {
                loopInfo.style.display = 'inline';
                loopValue.textContent = count;
            } else {
                loopInfo.style.display = 'none';
            }
        }

        /**
         * UUID v4 を生成
         */
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
    </script>
</body>
</html>
